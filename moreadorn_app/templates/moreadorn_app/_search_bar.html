<form method="get" class="search-bar" role="search">
  <span class="search-icn">🔍</span>
  <input type="text" name="q" value="{{ q|default_if_none:'' }}"
         placeholder="Search by name, email, phone, website..." autocomplete="off" />
  <button type="submit" class="btn btn-primary">Search</button>
  {% if q %}<a href="?" class="clear-link">✕ Clear</a>{% endif %}
</form>
